    var tmp = document.createElement('div');
    tmp.innerHTML = reply;
    var text = tmp.textContent || '';
    function fallbackCopy() {
      var ta = document.createElement('textarea');
      ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
      document.body.appendChild(ta); ta.select();
      try { document.execCommand('copy'); } catch (e) {}
      document.body.removeChild(ta);
    }
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).catch(fallbackCopy);
    } else {
      fallbackCopy();
    }
    showToast('Текст скопирован');
  });
  document.querySelectorAll('[data-goto]').forEach(function (b) {
    b.addEventListener('click', function () {
      state.historyStack.push(state.currentNodeId);
      state.currentNodeId = b.getAttribute('data-goto');
      render();
    });
  });
}

function openAccessModal(projectId) {
  var project = data.projects.find(function (p) { return p.id === projectId; });
  if (!project) return;
  var others = data.users.filter(function (u) { return u.id !== project.ownerId; });
  function hasAccess(userId) { return data.access.some(function (a) { return a.projectId === projectId && a.userId === userId; }); }
  function rowsHtml() {
    return others.map(function (u) {
      var granted = hasAccess(u.id);
      return '<div class="card" style="padding:12px 16px;display:flex;align-items:center;gap:12px;margin-bottom:8px;">'
        + '<div style="flex:1;"><div style="font-weight:600;font-size:13.5px;">' + esc(u.name) + '</div><div class="muted" style="font-size:11.5px;">' + esc(u.email) + ' · ' + (u.role === 'admin' ? 'администратор' : 'оператор') + '</div></div>'
        + '<button class="btn' + (granted ? ' primary' : '') + '" data-toggle-access="' + u.id + '">' + (granted ? 'Доступ открыт' : 'Открыть доступ') + '</button>'
        + '</div>';
    }).join('');
  }
  var html = ''
    + '<div class="overlay" id="accessOverlay"><div class="modal" style="width:520px;">'
    + '  <div class="modal-header"><h3>Доступ к проекту «' + esc(project.name) + '»</h3><button class="icon-btn" id="closeAccessModal">✕</button></div>'
    + '  <div class="modal-body" id="accessModalBody">' + (others.length ? rowsHtml() : '<div class="empty-state">Больше пользователей нет</div>') + '</div>'
    + '  <div class="modal-footer"><button class="btn" id="doneAccessModal">Готово</button></div>'
    + '</div></div>';
  document.body.insertAdjacentHTML('beforeend', html);
  function wireToggles() {
    document.querySelectorAll('#accessOverlay [data-toggle-access]').forEach(function (b) {
      b.addEventListener('click', function () {
        var userId = b.getAttribute('data-toggle-access');
        var existing = data.access.find(function (a) { return a.projectId === projectId && a.userId === userId; });
        if (existing) { data.access = data.access.filter(function (a) { return a.id !== existing.id; }); }
        else { data.access.push({ id: uid('a'), projectId: projectId, userId: userId, role: 'view' }); }
        saveData(data);
        var body = document.getElementById('accessModalBody');
        if (body) body.innerHTML = rowsHtml();
        wireToggles();
      });
    });
  }
  wireToggles();
  function close() { var ov = document.getElementById('accessOverlay'); if (ov) ov.remove(); render(); }
  document.getElementById('closeAccessModal').addEventListener('click', close);
  document.getElementById('doneAccessModal').addEventListener('click', close);
}

function openUsersModal() {
  function rowsHtml() {
    return data.users.map(function (u) {
      var ownsProjects = data.projects.some(function (p) { return p.ownerId === u.id && !p.deletedAt; });
      var isSelf = u.id === state.currentUserId;
      return '<div class="card users-row">'
        + '<div style="flex:1;"><div style="font-weight:600;font-size:13.5px;">' + esc(u.name) + (isSelf ? ' <span class="muted" style="font-weight:400;">(вы)</span>' : '') + '</div><div class="muted" style="font-size:11.5px;">' + esc(u.email) + '</div></div>'
        + '<span class="role-badge">' + (u.role === 'admin' ? 'администратор' : 'оператор') + '</span>'
        + (!isSelf ? '<button class="icon-btn" data-delete-user="' + u.id + '" title="' + (ownsProjects ? 'Нельзя удалить — есть проекты' : 'Удалить пользователя') + '"' + (ownsProjects ? ' disabled' : '') + '><svg class="svg-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/></svg></button>' : '')
        + '</div>';
    }).join('');
  }
  var html = ''
    + '<div class="overlay" id="usersOverlay"><div class="modal" style="width:560px;">'
    + '  <div class="modal-header"><h3>Пользователи</h3><button class="icon-btn" id="closeUsersModal">✕</button></div>'
    + '  <div class="modal-body">'
    + '    <div id="usersListBody">' + rowsHtml() + '</div>'
    + '    <div class="card" style="padding:16px;margin-top:12px;">'
    + '      <div class="field-label" style="margin-bottom:10px;">Добавить пользователя</div>'
    + '      <div class="field"><input type="text" id="newUserName" placeholder="Имя" style="width:100%;"></div>'
    + '      <div class="field"><input type="email" id="newUserEmail" placeholder="Email" style="width:100%;"></div>'
    + '      <div class="field"><input type="text" id="newUserPassword" placeholder="Пароль" style="width:100%;"></div>'
    + '      <div class="field" style="display:flex;gap:8px;">'
    + '        <button type="button" class="pill-btn selected" data-role-choice="operator" id="roleChoiceOperator">Оператор</button>'
    + '        <button type="button" class="pill-btn" data-role-choice="admin" id="roleChoiceAdmin">Администратор</button>'
    + '      </div>'
    + '      <button class="btn primary" id="addUserBtn" style="width:100%;justify-content:center;">+ Добавить</button>'
    + '    </div>'
    + '  </div>'
    + '  <div class="modal-footer"><button class="btn" id="doneUsersModal">Готово</button></div>'
    + '</div></div>';
  document.body.insertAdjacentHTML('beforeend', html);

  var newRole = 'operator';
  document.querySelectorAll('#usersOverlay [data-role-choice]').forEach(function (b) {
    b.addEventListener('click', function () {
      newRole = b.getAttribute('data-role-choice');
      document.querySelectorAll('#usersOverlay [data-role-choice]').forEach(function (x) { x.classList.remove('selected'); });
      b.classList.add('selected');
    });
  });

  function wireDeletes() {
    document.querySelectorAll('#usersOverlay [data-delete-user]').forEach(function (b) {
      b.addEventListener('click', function () {
        if (b.hasAttribute('disabled')) return;
        var userId = b.getAttribute('data-delete-user');
        if (confirm('Удалить пользователя без возможности восстановления?')) {
          deleteUserAccount(data, userId);
          var body = document.getElementById('usersListBody');
          if (body) body.innerHTML = rowsHtml();
          wireDeletes();
          showToast('Пользователь удалён');
        }
      });
    });
  }
  wireDeletes();

  document.getElementById('addUserBtn').addEventListener('click', function () {
    var name = document.getElementById('newUserName').value.trim();
    var email = document.getElementById('newUserEmail').value.trim().toLowerCase();
    var password = document.getElementById('newUserPassword').value;
    if (!name || !email || !password) { showToast('Заполните все поля'); return; }
    if (data.users.some(function (u) { return u.email.toLowerCase() === email; })) { showToast('Такой email уже используется'); return; }
    createUserAccount(data, name, email, password, newRole);
    document.getElementById('newUserName').value = '';
    document.getElementById('newUserEmail').value = '';
    document.getElementById('newUserPassword').value = '';
    var body = document.getElementById('usersListBody');
    if (body) body.innerHTML = rowsHtml();
    wireDeletes();
    showToast('Пользователь добавлен');
  });

  function close() { var ov = document.getElementById('usersOverlay'); if (ov) ov.remove(); render(); }
  document.getElementById('closeUsersModal').addEventListener('click', close);
  document.getElementById('doneUsersModal').addEventListener('click', close);
}

/* ================= BOOT ================= */
function initFromQuery() {
  try {
    var params = new URLSearchParams(location.search);
    var pid = params.get('project');
    var mode = params.get('mode');
    if (pid && mode === 'operator') {
      var project = data.projects.find(function (p) { return p.id === pid; });
      if (project) {
        state.currentProjectId = pid;
        state.currentNodeId = project.rootNodeId;
        state.historyStack = [];
        state.view = 'operator';
      }
    }
  } catch (e) {}
}
var restoredUserId = restoreSession(data);
if (restoredUserId) { state.currentUserId = restoredUserId; state.view = 'dashboard'; }
initFromQuery();
render();
</script>
