  if (!project) return '<div class="op-shell"><div class="op-wrap"><div class="empty-state" style="color:#8b909b;">Проект не найден</div></div></div>';
  var node = data.nodes.find(function (n) { return n.id === state.currentNodeId; }) || data.nodes.find(function (n) { return n.id === project.rootNodeId; });
  var edges = childEdges(data, node.id);
  var has = node.managerReply && node.managerReply.trim();
  var topbar = ''
    + '<div class="op-topbar">'
    + '  <button class="op-icon-btn" id="opBackBtn" title="Назад"' + (state.historyStack.length ? '' : ' disabled') + '><svg class="svg-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg></button>'
    + '  <button class="op-icon-btn" id="opFontMinusBtn" title="Меньше шрифт">A-</button>'
    + '  <button class="op-icon-btn" id="opFontPlusBtn" title="Больше шрифт">A+</button>'

    + '  <button class="op-icon-btn" id="opResetBtn" title="Начать сначала"><svg class="svg-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg></button>'
    + '</div>';
  var card = '<div class="op-card"><div class="op-actions"><button class="op-icon-btn" id="opCopyBtn" title="Скопировать текст"><svg class="svg-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></button></div>'
    + '<h2>' + esc(node.title) + '</h2><div class="reply' + (has ? '' : ' empty') + '" style="font-size:' + state.opFontSize + 'px;">' + (has ? node.managerReply : 'Реплика менеджера не указана!') + '</div></div>';
  var optionsOrEnd = edges.length
    ? '<div class="op-options">' + edges.map(function (e) {
        var child = data.nodes.find(function (n) { return n.id === e.childNodeId; });
        return child ? '<button data-goto="' + child.id + '">' + esc(child.title) + '</button>' : '';
      }).join('') + '</div>'
    : '<div class="op-end">Это конец сценария для данной ветки.</div>';
  return '<div class="op-shell">' + topbar + '<div class="op-wrap">' + card + optionsOrEnd + '</div></div>';
}
function wireOperator() {
  var backBtn = document.getElementById('opBackBtn');
  if (backBtn) backBtn.addEventListener('click', function () {
    if (!state.historyStack.length) return;
    state.currentNodeId = state.historyStack.pop();
    render();
  });
  var resetBtn = document.getElementById('opResetBtn');
  if (resetBtn) resetBtn.addEventListener('click', function () {
    var project = data.projects.find(function (p) { return p.id === state.currentProjectId; });
    state.historyStack = [];
    state.currentNodeId = project.rootNodeId;
    render();
  });
  var fontMinusBtn = document.getElementById('opFontMinusBtn');
  if (fontMinusBtn) fontMinusBtn.addEventListener('click', function () {
    state.opFontSize = Math.max(12, state.opFontSize - 2);
    render();
  });
  var fontPlusBtn = document.getElementById('opFontPlusBtn');
  if (fontPlusBtn) fontPlusBtn.addEventListener('click', function () {
    state.opFontSize = Math.min(24, state.opFontSize + 2);
    render();
  });
  var copyBtn = document.getElementById('opCopyBtn');
  if (copyBtn) copyBtn.addEventListener('click', function () {
    var node = data.nodes.find(function (n) { return n.id === state.currentNodeId; });
    if (!node || !node.managerReply) return;
    var tmp = document.createElement('div');
    tmp.innerHTML = node.managerReply;
    var text = tmp.textContent || '';
    function fallbackCopy() {
      var ta = document.createElement('textarea');
      ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
      document.body.appendChild(ta); ta.select();
      try { document.execCommand('copy'); } catch (e) {}
      document.body.removeChild(ta);
    }
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).catch(fallbackCopy);
    } else {
      fallbackCopy();
    }
    showToast('Текст скопирован');
  });
  document.querySelectorAll('[data-goto]').forEach(function (b) {
    b.addEventListener('click', function () {
      state.historyStack.push(state.currentNodeId);
      state.currentNodeId = b.getAttribute('data-goto');
      render();
    });
  });
}

    + '        <button type="button" class="pill-btn" data-role-choice="admin" id="roleChoiceAdmin">Администратор</button>'
    + '      </div>'
    + '      <button class="btn primary" id="addUserBtn" style="width:100%;justify-content:center;">+ Добавить</button>'
    + '    </div>'
    + '  </div>'
    + '  <div class="modal-footer"><button class="btn" id="doneUsersModal">Готово</button></div>'
    + '</div></div>';
  document.body.insertAdjacentHTML('beforeend', html);

  var newRole = 'operator';
  document.querySelectorAll('#usersOverlay [data-role-choice]').forEach(function (b) {
    b.addEventListener('click', function () {
      newRole = b.getAttribute('data-role-choice');
      document.querySelectorAll('#usersOverlay [data-role-choice]').forEach(function (x) { x.classList.remove('selected'); });
      b.classList.add('selected');
    });
  });

  function wireDeletes() {
    document.querySelectorAll('#usersOverlay [data-delete-user]').forEach(function (b) {
      b.addEventListener('click', function () {
        if (b.hasAttribute('disabled')) return;
        var userId = b.getAttribute('data-delete-user');
        if (confirm('Удалить пользователя без возможности восстановления?')) {
          deleteUserAccount(data, userId);
          var body = document.getElementById('usersListBody');
          if (body) body.innerHTML = rowsHtml();
          wireDeletes();
          showToast('Пользователь удалён');
        }
      });
    });
  }
  wireDeletes();

  document.getElementById('addUserBtn').addEventListener('click', function () {
    var name = document.getElementById('newUserName').value.trim();
    var email = document.getElementById('newUserEmail').value.trim().toLowerCase();
    var password = document.getElementById('newUserPassword').value;
    if (!name || !email || !password) { showToast('Заполните все поля'); return; }
    if (data.users.some(function (u) { return u.email.toLowerCase() === email; })) { showToast('Такой email уже используется'); return; }
    createUserAccount(data, name, email, password, newRole);
    document.getElementById('newUserName').value = '';
    document.getElementById('newUserEmail').value = '';
    document.getElementById('newUserPassword').value = '';
    var body = document.getElementById('usersListBody');
    if (body) body.innerHTML = rowsHtml();
    wireDeletes();
    showToast('Пользователь добавлен');
  });

  function close() { var ov = document.getElementById('usersOverlay'); if (ov) ov.remove(); render(); }
  document.getElementById('closeUsersModal').addEventListener('click', close);
  document.getElementById('doneUsersModal').addEventListener('click', close);
}

/* ================= BOOT ================= */
function initFromQuery() {
  try {
    var params = new URLSearchParams(location.search);
    var pid = params.get('project');
    var mode = params.get('mode');
    if (pid && mode === 'operator') {
      var project = data.projects.find(function (p) { return p.id === pid; });
      if (project) {
        state.currentProjectId = pid;
        state.currentNodeId = project.rootNodeId;
        state.historyStack = [];
        state.view = 'operator';
      }
    }
  } catch (e) {}
}
var restoredUserId = restoreSession(data);
if (restoredUserId) { state.currentUserId = restoredUserId; state.view = 'dashboard'; }
initFromQuery();
render();
</script>
</body>
</html>
