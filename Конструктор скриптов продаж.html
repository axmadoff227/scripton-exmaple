<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Конструктор скриптов продаж</title>
<style>
:root{
  --bg:#f5f6fb; --panel:#fff; --border:#e3e5ee; --text:#181a23; --muted:#6b7080;
  --accent:#4f46e5; --accent-hover:#4338ca; --accent-soft:#eef0ff;
  --success:#16a34a; --success-soft:#eafaf0; --danger:#dc2626; --danger-soft:#fef1f1;
  --warn:#d97706; --warn-soft:#fff7ea;
}
*{box-sizing:border-box;}
html,body{margin:0;height:100%;}
body{font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:var(--bg);color:var(--text);}
button,input,textarea,select{font-family:inherit;}
#app{min-height:100vh;}
::-webkit-scrollbar{width:8px;height:8px;}
::-webkit-scrollbar-thumb{background:rgba(120,120,145,.35);border-radius:8px;}
::-webkit-scrollbar-track{background:transparent;}

/* ---------- shared ---------- */
.btn{height:36px;padding:0 16px;border-radius:9px;border:1px solid var(--border);background:var(--panel);color:var(--text);font-size:13px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;white-space:nowrap;}
.btn:hover{background:var(--bg);}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600;}
.btn.primary:hover{background:var(--accent-hover);}
.btn.danger{color:var(--danger);}
.btn.ghost{border-color:transparent;background:transparent;}
.icon-btn{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:var(--panel);color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.icon-btn:hover{color:var(--text);background:var(--bg);}
input[type=text],input[type=email],input[type=password],input[type=search]{height:38px;border-radius:9px;border:1px solid var(--border);background:var(--panel);color:var(--text);padding:0 12px;font-size:13.5px;outline:none;}
input[type=text]:focus,input[type=email]:focus,input[type=password]:focus,input[type=search]:focus{border-color:var(--accent);}
.card{background:var(--panel);border:1px solid var(--border);border-radius:14px;}
.muted{color:var(--muted);}
.svg-icon{width:16px;height:16px;flex-shrink:0;}
.overlay{position:fixed;inset:0;background:rgba(15,15,25,.45);z-index:200;display:flex;align-items:center;justify-content:center;padding:24px;}
.modal{background:var(--panel);border-radius:16px;box-shadow:0 20px 50px rgba(0,0,0,.3);max-height:88vh;display:flex;flex-direction:column;}
.modal-header{display:flex;justify-content:space-between;align-items:center;padding:20px 24px;border-bottom:1px solid var(--border);}
.modal-header h3{margin:0;font-size:17px;}
.modal-body{padding:20px 24px;overflow-y:auto;flex:1;}
.modal-footer{display:flex;justify-content:flex-end;gap:10px;padding:16px 24px;border-top:1px solid var(--border);}
.chip{display:inline-flex;align-items:center;gap:6px;background:var(--accent-soft);color:var(--accent);border-radius:20px;padding:6px 12px;font-size:12.5px;font-weight:500;}
.chip button{background:none;border:none;color:inherit;cursor:pointer;font-size:13px;padding:0;line-height:1;}
.pill-btn{padding:8px 14px;border-radius:20px;border:1px solid var(--border);background:var(--panel);font-size:12.5px;cursor:pointer;}
.pill-btn.selected{background:var(--accent);border-color:var(--accent);color:#fff;}
.lang-toggle{display:flex;gap:4px;}
.lang-toggle .pill-btn{padding:6px 12px;font-weight:700;}
.op-topbar .lang-toggle .pill-btn{border-color:#262a33;background:#181b22;color:#c7cad1;}
.op-topbar .lang-toggle .pill-btn.selected{background:var(--accent);border-color:var(--accent);color:#fff;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;padding:12px 22px;border-radius:10px;font-size:13px;box-shadow:0 8px 24px rgba(0,0,0,.2);z-index:300;}

/* ---------- login ---------- */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
.login-box{width:100%;max-width:380px;}
.login-brand{text-align:center;margin-bottom:26px;}
.login-brand .mark{width:52px;height:52px;border-radius:16px;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:22px;margin:0 auto 14px;}
.login-brand h1{font-size:20px;margin:0 0 4px;}
.login-brand p{color:var(--muted);font-size:13px;margin:0;}
.field-label{font-size:12px;font-weight:600;color:var(--muted);margin-bottom:6px;}
.field{margin-bottom:14px;}
.field input{width:100%;}
.demo-hint{font-size:11.5px;color:var(--muted);text-align:center;margin-top:14px;line-height:1.6;}

/* ---------- app shell ---------- */
.topbar{height:60px;background:var(--panel);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:14px;}
.topbar .brand{display:flex;align-items:center;gap:10px;font-weight:700;font-size:14.5px;}
.topbar .brand .mark{width:28px;height:28px;border-radius:8px;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;}
.topbar .spacer{flex:1;}
.topbar .user{font-size:12.5px;color:var(--muted);margin-right:6px;}

/* ---------- dashboard ---------- */
.dash-wrap{max-width:1100px;margin:0 auto;padding:28px 24px 60px;}
.dash-toolbar{display:flex;align-items:center;gap:10px;margin-bottom:20px;flex-wrap:wrap;}
.dash-toolbar h1{font-size:20px;margin:0;flex-shrink:0;}
.dash-toolbar .grow{flex:1;min-width:160px;}
.dash-toolbar input[type=search]{width:100%;}
.view-toggle{display:flex;gap:2px;background:var(--bg);border:1px solid var(--border);border-radius:9px;padding:3px;}
.view-toggle button{width:32px;height:30px;border:none;background:transparent;border-radius:7px;cursor:pointer;color:var(--muted);display:flex;align-items:center;justify-content:center;}
.view-toggle button.active{background:var(--panel);color:var(--accent);box-shadow:0 1px 2px rgba(0,0,0,.08);}
.proj-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px;}
.proj-card{padding:18px;display:flex;flex-direction:column;gap:10px;}
.proj-card .name{font-weight:700;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.proj-card .date{font-size:11.5px;color:var(--muted);}
.proj-card .actions{display:flex;gap:6px;margin-top:auto;}
.proj-list{display:flex;flex-direction:column;gap:8px;}
.proj-row{padding:12px 16px;display:flex;align-items:center;gap:14px;}
.proj-row .name{font-weight:600;font-size:13.5px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.proj-row .date{font-size:11.5px;color:var(--muted);width:100px;flex-shrink:0;}
.proj-row .actions{display:flex;gap:6px;}
.empty-state{text-align:center;padding:60px 20px;color:var(--muted);}

/* ---------- editor ---------- */
.editor-shell{display:flex;flex-direction:column;height:calc(100vh - 60px);}
.editor-topbar{height:56px;flex-shrink:0;display:flex;align-items:center;gap:12px;padding:0 20px;background:var(--panel);border-bottom:1px solid var(--border);}
.editor-topbar .proj-title{font-weight:700;font-size:14.5px;}
.editor-body{flex:1;display:flex;overflow:hidden;}
.tree-pane{width:420px;flex-shrink:0;border-right:1px solid var(--border);background:var(--panel);display:flex;flex-direction:column;}
.tree-pane .search-box{padding:14px;border-bottom:1px solid var(--border);}
.tree-pane .search-box input{width:100%;}
.tree-scroll{flex:1;overflow-y:auto;padding:14px 10px 30px;}
.node-row{display:flex;align-items:center;gap:6px;padding:7px 8px;border-radius:8px;cursor:pointer;position:relative;}
.node-row:hover{background:var(--bg);}
.node-row:hover .node-actions{display:flex;}
.node-row .chevron{width:16px;height:16px;flex-shrink:0;color:var(--muted);transition:transform .12s ease;display:flex;align-items:center;justify-content:center;}
.node-row .chevron.open{transform:rotate(90deg);}
.node-row .node-icon{width:16px;height:16px;flex-shrink:0;color:var(--accent);}
.node-row .node-icon.root{color:var(--success);}
.node-row .title{flex:1;font-size:13.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.node-row.root-row .title{font-weight:700;}
.node-row .reuse-badge{font-size:10px;color:var(--muted);background:var(--bg);border-radius:5px;padding:1px 5px;flex-shrink:0;}
.node-actions{display:none;gap:2px;flex-shrink:0;}
.node-actions button{width:24px;height:24px;border-radius:6px;border:none;background:transparent;color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;}
.node-actions button:hover{background:var(--panel);color:var(--text);box-shadow:0 0 0 1px var(--border);}
.node-actions button.danger:hover{color:var(--danger);}
.node-children{margin-left:19px;border-left:1px dashed var(--border);padding-left:10px;}
.node-reply-box{margin:2px 0 6px 22px;padding:10px 12px;background:var(--bg);border-radius:9px;font-size:12.5px;line-height:1.55;color:var(--text);position:relative;}
.node-reply-box.empty{color:var(--muted);font-style:italic;}
.node-reply-box .edit-reply-btn{position:absolute;top:6px;right:6px;width:22px;height:22px;border-radius:6px;border:none;background:var(--panel);color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .1s;}
.node-reply-box:hover .edit-reply-btn{opacity:1;}
.node-reply-box p{margin:0 0 6px;}
.add-answers-link{margin:2px 0 10px 22px;font-size:12px;color:var(--accent);background:none;border:none;cursor:pointer;padding:4px 0;font-weight:600;}
.add-answers-link:hover{text-decoration:underline;}
.editor-main{flex:1;overflow-y:auto;padding:26px 32px;background:var(--bg);}
.editor-hint{max-width:640px;color:var(--muted);font-size:13px;line-height:1.7;}
.editor-hint h2{font-size:16px;color:var(--text);margin:0 0 10px;}

/* ---------- add-answers modal ---------- */
.new-answers-input{display:flex;flex-wrap:wrap;gap:8px;padding:10px;border:1px solid var(--border);border-radius:10px;background:var(--bg);align-items:center;}
.new-answers-input input{border:none;background:transparent;outline:none;flex:1;min-width:140px;font-size:13px;}
.enter-hint{font-size:10.5px;color:var(--muted);background:var(--panel);border:1px solid var(--border);border-radius:5px;padding:2px 6px;}
.existing-answers-grid{display:flex;flex-wrap:wrap;gap:8px;max-height:260px;overflow-y:auto;padding:4px 2px;}

/* ---------- operator (dark) ---------- */
.op-shell{min-height:100vh;background:#0f1115;color:#f1f1f4;}
.op-topbar{height:60px;display:flex;align-items:center;padding:0 20px;gap:12px;border-bottom:1px solid #262a33;}
.op-topbar .title{font-weight:700;font-size:14px;flex:1;text-align:center;}
.op-icon-btn{width:32px;height:32px;border-radius:8px;border:1px solid #262a33;background:#181b22;color:#c7cad1;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.op-icon-btn:hover{background:#20242c;}
.op-icon-btn:disabled{opacity:.4;cursor:default;}
.op-wrap{max-width:820px;margin:0 auto;padding:30px 24px 60px;}
.op-card{background:#181b22;border:1px solid #262a33;border-radius:16px;padding:26px 30px;position:relative;}
.op-card .op-actions{position:absolute;top:16px;right:18px;display:flex;gap:6px;}
.op-card h2{font-size:21px;margin:0 22px 14px 0;}
.op-card .reply{font-size:14.5px;line-height:1.7;}
.op-card .reply.empty{color:#8b909b;font-style:italic;}
.op-card .reply p{margin:0 0 10px;}
.op-options{margin-top:22px;display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
@media (max-width:760px){.op-options{grid-template-columns:repeat(2,1fr);}}
@media (max-width:480px){.op-options{grid-template-columns:1fr;}}
.op-options button{text-align:left;padding:14px 16px;border-radius:12px;border:1px solid #262a33;background:#181b22;color:#f1f1f4;cursor:pointer;font-size:13px;}
.op-options button:hover{border-color:var(--accent);}
.op-end{margin-top:18px;font-size:13px;color:#8b909b;font-style:italic;}

/* ---------- misc additions ---------- */
.modal.fullscreen{position:fixed;inset:0;width:100%;height:100%;max-height:100%;border-radius:0;}
.modal-footer.spread{justify-content:space-between;}
.color-input{width:30px;height:30px;padding:2px;border:1px solid var(--border);border-radius:6px;cursor:pointer;background:var(--panel);}
.users-row{padding:12px 16px;display:flex;align-items:center;gap:12px;margin-bottom:8px;}
.role-badge{font-size:10.5px;font-weight:600;padding:2px 8px;border-radius:10px;background:var(--accent-soft);color:var(--accent);flex-shrink:0;}
</style>
</head>

  };
  var bilingualProjectDefs = [{"name":{"ru":"CLICK — Подключение к сервисам","uz":"CLICK — Ulanish xizmatlari"},"rootId":"p1root","nodes":[{"id":"p1r612886u652441","title":{"ru":"Временно не возможно","uz":"Vaqtinchalik mumkin emas"},"reply":{"ru":"<p>Такую карту не возможно добавить в систему</p>","uz":"<p>Bu turdagi kartani click tizimiga ulash imkoni yo'q</p>"}},{"id":"p1r617237u652479","title":{"ru":"Click Up","uz":"Click Up"},"reply":{"ru":"<p>В первую очередь скачайте приложение через Google Play или app store. Пройдите регистрацию вводя номер телефона и смс с кодом подтверждения. Далее установите пин код. <br/><br/>Важно! <br/>SIM-карта (eSIM) с номером телефона, на который вы хотите открыть аккаунт в CLICK, должна быть установлена в устройстве, с которого вы выполняете вход по коду.</p>","uz":"<p>Birinchi navbatda Google Play yoki App store orqali ilovani yuklab oling. Telefon raqamingizni va sms kodni kiritib ro'yxatdan o'ting va Click pin o'rnating.</p>"}},{"id":"p1r873542u873546","title":{"ru":"Ошибка- Регистрация невозможна, заблокировано системой безопасности","uz":"Xatolik! Регистрация невозможна, заблокировано системой безопасности"},"reply":{"ru":"<p>Уважаемый (имя пользователя) данная ошибка связана со способом подключения к сети, рекомендуем провести следующие действия:    <br/>1) Отключитесь от сети WI-FI и включите мобильный интернет <br/>2) Отключите VPN если он у вас подключен <br/>3) Уважаемый пользователь если вы не находитесь на территории Республики Узбекистан к сожалению вы не сможете пройти авторизацию.</p>","uz":"<p>Hurmatli (foydalanuvchi ismi) bu xato tarmoqqa ulanish usuli bilan bog‘liq, quyidagi amallarni bajarishni tavsiya etamiz: <br/>1) WI-FI tarmog‘idan uziling va mobil internetni yoqing <br/>2) Agar sizda VPN ulangan bo‘lsa, uni o‘chiring <br/>3) Hurmatli foydalanuvchi, agar siz O‘zbekiston Respublikasi hududida bo‘lmasangiz, afsuski, avtorizatsiyadan o‘ta olmaysiz.</p>"}},{"id":"p1r612882u652437","title":{"ru":"Telegram bot","uz":"Telegram bot"},"reply":{"ru":"<p>Именно какую ошибку выдает вам бот ?</p>","uz":"<p>Aynan qanday xatolik yuz bermoqda ?</p>"}},{"id":"p1r617886u652522","title":{"ru":"Если Срок неверный","uz":"Agar Срок неверный"},"reply":{"ru":"<p>Вы ввели неправильный срок действия карты. Убедитесь в правилности данных ваших карт и попробуйте заново</p>","uz":"<p>Kartaning amal qilish muddatini noto'g'ri kiritdingiz. Karta ma'lumotlarini tekshirib qaytadan urunib ko'ring</p>"}},{"id":"p1r612888u652443","title":{"ru":"Хумо","uz":"Humo"},"reply":{"ru":"<p>Для подключении необходимо подключить смс инфо через банк</p>","uz":"<p>Ulanish uchun sms xabarnomani bank orqali yoqish shart</p>"}},{"id":"p1r612880u652435","title":{"ru":"USSD (*880#)","uz":"USSD (*880#)"},"reply":{"ru":"<p>А именно какую ошибку выдает ? </p>","uz":"<p>Aynan qanday xatolik yuz bermoqda ?</p>"}},{"id":"p1r613635u652455","title":{"ru":"Профиль заблокирован","uz":"Profil bloklandi"},"reply":{"ru":"<p><span style=\"font-family: 'arial black', 'avant garde'; color: #ff0000;\">Проверять \"Сессии CLICK Evolution\" в арме и если там написано заблокирован</span> <span style=\"color: #ff0000; font-family: 'arial black', 'avant garde';\">то спрашиваем модель телефона клиента и отправляем в группу \"СТП Рабочая группа\" Далее: <br/><span style=\"color: #000000;\">Из за того что вы  несколько раз неправильно ввели CLICK Pin у вас аккаунт заблокировался сейчас и убрали блок можете заново попробовать</span></span></p>","uz":"<p><span style=\"color: #ff0000;\"><strong>ARM anketada \"Сессии CLICK Evolution\" ochamiz va tekshiramiz. Agarda \"Заблокирован\" deb yozilgan bo'lsa mijozdan telefon qurilmasini modelini so'raymiz va \"СТП Рабочая группа\" ga yuboramiz</strong></span>.</p>\n<p>CLICK Pin kodni bir necha marotaba noto'g'ri kiritganingiz sababli sizda ilova bloklangan. Hozir sizdan blokni yechamiz taxminan 5 daqiqa ichida qayta urunib ko'ring. </p>"}},{"id":"p1r873540u873544","title":{"ru":"CLICK super app (авторизация)","uz":"CLICK super app (авторизация)"},"reply":{"ru":"<p>авторизация это процесс входа в уже существующий аккаунт. </p>\n<p>[скриншот в оригинале скрипта]</p>","uz":"<p>avtorizatsiya - bu allaqachon mavjud akkauntga kirish jarayoni <br/><br/>[скриншот в оригинале скрипта]</p>"}},{"id":"p1r617236u652478","title":{"ru":"USSD (*880#)","uz":"USSD (*880#)"},"reply":{"ru":"<p>Подключена ли у вас смс информирование ?</p>","uz":"<p>Sizda sms xabarnoma yoqilganmi ? </p>"}},{"id":"p1r612885u652440","title":{"ru":"ММИ ошибка","uz":"MMI xatolik"},"reply":{"ru":"<p>попробуйте ввести данные быстрее так как в каждом разделе USSD есть ограничение на 15сек или же вы можете зарегистрировать карту набрав *880*0*номер карты*Срок действия#</p>","uz":"<p>Ma'lumotlarni tezroq kiritishga harakat qiling, chunki har bir USSD menyusidagi ko'rsatmalar uchun 15 soniya taqdim etiladi yoki qisqa kod orqali ro'yxatdan o'tishingiz mumkin <span>*880*0*karta raqami*amal qilish muddati#</span></p>"}},{"id":"p1r617880u652517","title":{"ru":"Карту не могу добавить","uz":"Karta qo'sha olmayapman"},"reply":{"ru":"<p>Каким способом вы пытались добавить карту ?</p>","uz":"<p>Aynan qaysi ketma ketlikda kiritdingiz ? Menyular orqalimi yoki registratsiya qisqa kodi bilanmi ? </p>"}},{"id":"p1r873543u873547","title":{"ru":"СМС с кодом подтверждения не приходит","uz":"Tasdiqlash kodlik SMS kelmayapti"},"reply":{"ru":"<p>Уважаемый (имя пользователя) пожалуйста выполните следующие действия: <br/>1) убедитесь что номер телейфона введен корректно <br/>2) SIM-карта должна быть установлена в смартфон, если она установлена в кнопочный телефон смс не будет отправлен <br/>3) SIM-карта должна быть установлена в устройства с зарегестрированным IMEI в гос. реестре <br/>4) Если версия приложения устарела и не поддерживается пользователь должен обновить его <br/><span style=\"color: rgb(224, 62, 45);\">Оператор: Возможно аккаунт пользоваетля заблокирован проверьте статус регистрации в ARM -&gt; обратитесь  к супервайзеру </span></p>","uz":"<p>Hurmatli (foydalanuvchi nomi) <br/>1) telefon raqami to‘g‘ri kiritilganligiga ishonch hosil qiling <br/>2) SIM karta smartfonga o‘rnatilgan bo‘lishi kerak, agar u tugmachali telefonga o‘rnatilgan bo‘lsa, SMS yuborilmaydi <br/>3) SIM karta IMEI davlat reyestrida ro‘yxatdan o‘tgan qurilmaga o‘rnatilgan bo‘lishi kerak <br/>4) Agar ilovaning versiyasi eskirgan va qo‘llab-quvvatlanmasa, foydalanuvchi uni yangilashi kerak <br/><br/><span style=\"color: rgb(224, 62, 45);\">Оператор: Возможно аккаунт пользоваетля заблокирован проверьте статус регистрации в ARM -&gt; обратитесь  к супервайзеру</span></p>"}},{"id":"p1r613437u652446","title":{"ru":"А вы не можете подключить ?","uz":"Siz yoqib bera olmaysizmi ?"},"reply":{"ru":"<p>К сожалению нет. Смс информирование можно подключить только через банкоматы</p>","uz":"<p>Afsuski yo'q. Sms xabarnomani faqatgina bank orqali yoqish mumkin.</p>"}},{"id":"p1r616902u652468","title":{"ru":"ввожу смс код но бот не реагирует","uz":"Kodni kiritdim hech nima o'zgarmadi"},"reply":{"ru":"<p>Смс код куда вы именно куда вводите ? <br/>Проходя через ссылку на наш сайт или самому боту ? </p>","uz":"<p>Sms kodni aynan qayerga kiritdingiz ? <br/>Havola orqali bizning saytga o'tibmi yoki botni o'zigami ? </p>"}},{"id":"p1r616829u652464","title":{"ru":"Подключен","uz":"Yoqilgan"},"reply":{"ru":"<p>Вам необходимо отключить VPN и зайти с мобильного интернета так как наша система считает вас за границей и не пропускает вас. </p>","uz":"<p>Sizning internetingiz ip larini O'zbekistondan tashqari ko'rsatgani sabab sizni tizim ilovaga o'tkazmaydi. Vpn o'chirib qaytadan urunib ko'ring</p>"}},{"id":"p1r873541u873545","title":{"ru":"Как пройти авторизацию","uz":"Qanday qilib avtorizatsiyadan o`tish mumkin"},"reply":{"ru":"<p>Откройте приложение CLICK super app -&gt; введите номер телефона -&gt; дождитесь СМС с кодом подвтерждения от \"Antifraud\" -&gt; введите код подтверждения из смс  </p>","uz":"<p>CLICK super app ilovasiga kiring -&gt; telefon raqamini kiriting -&gt; \"Antifraud\"dan tasdiqlash ko`dlik SMSni kuting -&gt; SMS’dagitasdiqlash ko`dni kiriting</p>"}},{"id":"p1r613494u652453","title":{"ru":"Как подключиться на эти интерфейсы ?","uz":"Online interfeyslarga qanday ulanish mumkin ?"},"reply":{"ru":"<div class=\"text-sm text-gray-700 bg-gray-50 p-4 rounded-lg text-center\">Реплика менеджера не указана!</div>","uz":"<div class=\"text-sm text-gray-700 bg-gray-50 p-4 rounded-lg text-center\">Реплика менеджера не указана!</div>"}},{"id":"p1r612887u652442","title":{"ru":"Узкард","uz":"Uzcard"},"reply":{"ru":"<p>Для подключении необходимо включить смс инфо через банкоматы</p>","uz":"<p>Ulanish uchun sms xabarnoma xizmati yoqilgan bo'lishi shart ! Sms xabarnoma yoqilgandan keyn ulanish mumkin</p>"}},{"id":"p1r613443u652448","title":{"ru":"Beeline, Ucell, MobiUz, Uzmobile(Gsm)","uz":"Beeline, Ucell, MobiUz, Uzmobile(Gsm)"},"reply":{"ru":"<p>Ваше устройство случайно не корейски ? </p>","uz":"<p>Sizning telefon qurilmangiz koreyaniki emasmi ? </p>"}},{"id":"p1r848175u750042","title":{"ru":"ТГ БОТ не работает (ограничения)","uz":"Telegram bot cheklov"},"reply":{"ru":"<p class=\"leading-8 font-normal\" data-pm-slice=\"1 1 []\">Причина ограничения Telegram-бота заключается в том, что среди устройств, вошедших в приложение Click  была обнаружена подозрительная сессия. Чтобы снять ограничения сейчас, зарегистрируйтесь в приложении и пройдите идентификацию, затем удалите ненужные устройства среди доверенных устройств, и у вас активируется телеграм-бот</p>","uz":"<p>Telegram botga cheklov tushishining sababi Click superapp ilovasiga kirgan qurilmalar orasida shubhali sessiya aniqlangan. Hozirda cheklovlarni yechish uchun ilovada ro'yxatdan o'ting va identifikatsiyan o'ting, so'ngra ishonchli qurilmalar orasidan kerakmas qurilmalarni o'chirib yuboring va sizda telegram bot faol holatga keladi </p>"}},{"id":"p1r618091u652549","title":{"ru":"Ограничение","uz":"Cheklov"},"reply":{"ru":"<p>(Выясняем именно какую ошибку выдает клиенту) <br/>Причины ограничений:<br/>1. При регистрации с нового устройства.<br/>2. При переустановке приложения<br/>3. При перерегистрации аккаунта на другой<br/>4. При использовании VPN</p>","uz":"<p>Aynan qanday xatolik yuz bermoqda ?</p>\n<p>Cheklov tushishi sabablari:</p>\n<p>1. Yangi qurilmada ro'yxatdan o'tganda.<br/>2. Ilovani qayta o'rnatganda<br/>3. VPN orqali ilovaga kirish bo'lganda. </p>"}},{"id":"p1r612883u652438","title":{"ru":"WEB","uz":"WEB"},"reply":{"ru":"<p>Именно какую ошибку выдает вам ?</p>","uz":"<p>Aynan qanday xatolik yuz bermoqda ? </p>"}},{"id":"p1r612930u652444","title":{"ru":"Понял","uz":"Tushunarli"},"reply":{"ru":"<p>Есть ли у вас еще вопросы ?</p>","uz":"<p>Yana savollaringiz bormi ? </p>"}},{"id":"p1r613636u652456","title":{"ru":"Заблокирована системой безопасности","uz":"Xavfsizlik tizimi tomonidan bloklandi"},"reply":{"ru":"<p>Вы находитесь в территории Республики Узбекистан ?</p>","uz":"<p>Siz O'zbekiston Respublikasi hududidamisiz ? </p>"}},{"id":"p1r612852u652427","title":{"ru":"Подключение (новое)","uz":"Ulanish (yangi)"},"reply":{"ru":"<p>Через какой интерфейс вы хотите зарегистрироваться ?</p>","uz":"<p>Aynan qaysi interfeysimiz ro'yxatdan o'tmoqchisiz ?</p>"}},{"id":"p1r613439u652447","title":{"ru":"Я быстро набираю но все равно выдает ошибку","uz":"Tez kiritdim baribir xatolik"},"reply":{"ru":"<p>Каким вы мобильным оператором пользуетесь ? </p>","uz":"<p>Qaysi mobil operatoridan foydalanasiz ?</p>"}},{"id":"p1r616907u652473","title":{"ru":"На сайт вообще не входит и долго грузится","uz":"Sayt umuman ochilmadi qizil yozuvlarda xatolik"},"reply":{"ru":"<p>А вы через какой браузер открываете ссылку ?</p>","uz":"<p>Siz aynan qaysi brauzer orqali havola ochdingiz ? </p>"}},{"id":"p1r612851u652426","title":{"ru":"Подключение (ошибка)","uz":"Ulanish (xatolik)"},"reply":{"ru":"<p>Через какой интерфейс вы пытаетесь подключится ?</p>","uz":"<p>Aynan qaysi interfeysimiz orqali ro'yxatdan o'tmoqchisiz ? </p>"}},{"id":"p1r616910u652476","title":{"ru":"в поле ввода сообщения","uz":"Klaviatura orqali"},"reply":{"ru":"<p>Для подтверждения пин кода нужно нажать на цифры которые вам предоставил бот. </p>","uz":"<p>Pin kodni kiritish uchun sizga bot taqdim etgan tayyor tugmalar orqali kiritishingiz lozim. </p>"}},{"id":"p1r616906u652472","title":{"ru":"В боте где можно написать сообщение","uz":"Telegram botni o'ziga"},"reply":{"ru":"<p>Для того чтобы подтвердить смс код вам нужно нажать на кнопку \"Ввести код\" который дал вам бот и оттуда перейти на наш сайт</p>","uz":"<p>Sms kodni tasdiqlash uchun siz \"Kodni kiritish\" tugmasi orqali havolaga o'tib shu yerda kiritishingiz lozim </p>"}},{"id":"p1r616901u652467","title":{"ru":"Номер не принимает","uz":"Telefon raqam qabul qilmadi"},"reply":{"ru":"<p>Для того чтобы зарегистрироваться к нашему боту ваш номер телефона в телеграме должен совпадать с номером телефона подключенной к CLICK. Если номера не совпадут то вам необходимо создать телеграм аккаунт с того номера к которому у вас CLICK подключен. </p>","uz":"<p>Telegram botimizga ro'yxatdan o'tish uchun avvalo sizning telegram akkauntingiz va Click akkauntingiz raqamlari bir biriga mos kelishi lozim.  Agarda raqam mos kelmasa u holda Click akkaunt ochilgan raqamdan telegram akkaunt ochishingiz lozim.</p>"}},{"id":"p1r617887u652523","title":{"ru":"Если 1[05] ошибка","uz":"Agar 1[05] ошибка"},"reply":{"ru":"<p>Так как ваша карта Хумо при регистрации USSD могут возникать задержки в получении данных. Попробуйте добавить карту через наше приложение Click Up.</p>","uz":"<p>Sizning kartangiz Humo bo'lgani uchun USSD orqali ro'yxatdan o'tishda uzilishlar bo'lishi mumkin. Kartani Click Up ilovamiz orqali qo'shib ko'rishga harakat qiling</p>"}},{"id":"p1r612974u652445","title":{"ru":"Нет спасибо","uz":"Yo"},"reply":{"ru":"<p>благодарим за обращение, ответьте на вопрос после звонка До свидание</p>","uz":"<p>Murojaatingiz uchun raxmat. Suhbatdan keyingi savolga javob qoldirishingizni so'raymiz. Salomat bo'ling</p>"}},{"id":"p1r612881u652436","title":{"ru":"CLICK super app","uz":"CLICK evolution"},"reply":{"ru":"<p>Именно какую ошибку выдает вам в приложении? </p>","uz":"<p>Aynan qanday xatolik yuz bermoqda ?</p>"}},{"id":"p1r897370u897371","title":{"ru":"sim карта","uz":"Sim karta"},"reply":{"ru":"<div class=\"mb-8 p_editor_center_item_text\">\n<div class=\"\">\n<p>[скриншот в оригинале скрипта]<br/><br/><br/>SIM-карта (eSIM) с номером телефона, на который вы хотите открыть аккаунт в CLICK, должна быть установлена в устройстве, с которого вы выполняете вход по коду.</p>\n</div>\n</div>\n<div class=\"p_editor_center_item_answers\"> </div>","uz":"<p>[скриншот в оригинале скрипта]<br/><br/><br/>CLICK’da akkaunt ochmoqchi bo‘lgan telefon raqamiga ulangan SIM-karta (eSIM), kod orqali kirishni amalga oshirayotgan qurilmaga o‘rnatilgan bo‘lishi kerak.</p>"}},{"id":"p1r617881u652518","title":{"ru":"Выбирал в поэтапном порядке","uz":"Menyular orqali ketma ket"},"reply":{"ru":"<p>Для быстрого подключения карты вам нужно воспользоваться удобным способом по Шорт запросы, то есть *880*0*номер карты*срок действие# <br/><br/>(И отправим смс шаблон \"Регистрация USSD\")</p>","uz":"<p>Ro'yxatdan o'tish uchun qulay qisqa kodimiz orqali foydalaning. Buning uchun quyidagicha tering: <span>*880*0*karta raqami*amal qilish muddati#</span></p>\n<p><span><br/>(\"Регистрация USSD\" sms shablon jo'natish kerak)</span></p>"}},{"id":"p1r613637u652457","title":{"ru":"Код не приходит","uz":"Kod kelmadi"},"reply":{"ru":"<p><span style=\"font-family: 'arial black', 'avant garde'; color: #ff0000;\">Проверьте СМС в арме если там:</span><br/><span style=\"color: #ff0000; font-family: 'arial black', 'avant garde';\">\"Operator-OK/Client-OK\"</span> -- с нашей стороны смс вам уходят попробуйте заново или же проверьте смс от нашей системы нет ли в черном списке (спаме)<br/><span style=\"font-family: 'arial black', 'avant garde'; color: #ff0000;\">\"Operator-OK/Client-Err\" Отправляем в группу \"стп рабочая группа\" и тегаем сотрудников стп</span></p>","uz":"<p><span style=\"font-family: 'arial black', 'avant garde'; color: #ff0000;\">ARM anketadan sms tekshirib ko'ring:</span><br/><span style=\"color: #ff0000; font-family: 'arial black', 'avant garde';\">\"Operator-OK/Client-OK\"</span> -- Biz tomondan smslar siz yuborilgan qaytadan urunib ko'ring yoki smslaringizni tekshirib ko'ring balki click smslari qora ro'yxatda emasmi ?<br/><span style=\"font-family: 'arial black', 'avant garde'; color: #ff0000;\">\"Operator-OK/Client-Err\"  \"стп рабочая группа\" ga yuboramiz va texnik hodimlarni belgilaymiz. </span></p>"}},{"id":"p1r616827u652462","title":{"ru":"Нет","uz":"Yo'q"},"reply":{"ru":"<p>Вы можете пройти регистрацию находясь на территории Республики узбекистан или же можете пройти регистрацию подключив роуминг.</p>","uz":"<p>Siz faqatgina O'zbekiston Respublikasi hududidangina Click Up ilovamizga ro'yxatdan o'ta olasiz. Agarda sim karta o'zingiz bilan bo'lsa Rouming xizmatidan foydalanib kirishingiz mumkin</p>"}},{"id":"p1r618295u655097","title":{"ru":"Приложение не работает/ Ограничения","uz":"Ilova ishlamadi, cheklovlar"},"reply":{"ru":"<p class=\"leading-8 font-normal\" data-pm-slice=\"1 1 []\">Чтобы снять ограничения в приложении, вам необходимо пройти идентификацию. После того, как вы пройдете идентификацию, вы получите полный доступ ко всем функциям приложения.</p>","uz":"<p>Ilovadagi cheklovlarni olish uchun identifikatsiyadan o'tishingiz lozim. Identifikatsiyadan o'tganingizdan so'ng sizda ilovaning barcha funksionali to'liq ishga tushadi</p>"}},{"id":"p1r616911u652477","title":{"ru":"На готовые цифры","uz":"Botning tugmalari orqali"},"reply":{"ru":"<p><span>Система не принимает код простой пин код то есть пин код состоявщий из 5ти одинаковых и последовательных цифр. Примеры: 55555 12345 98765.</span></p>","uz":"<p><span>Tizim oson pin kodlarni qabul qilmaydi. Bir xil sonlardan yoki ketma ket sonlardan iborat pin kodlarni o'rnatmang. Masalan: 55555 12345 98765.</span></p>"}},{"id":"p1r616828u652463","title":{"ru":"Нет","uz":"Yo'q"},"reply":{"ru":"<p>Вы через WiFi пытаетесь зайти ?</p>","uz":"<p>Siz WiFi orqali kirishga urunyapsizmi ? </p>"}},{"id":"p1r613448u652449","title":{"ru":"Humans, Perfectum, Uzmobile (CDMA)","uz":"Humans, Perfectum, Uzmobile (CDMA)"},"reply":{"ru":"<p>Так как на этих сим картах не работает услуга USSD у вас выдает ошибку но вы можете использоварть наши онлайн интерфейсы без проблем</p>","uz":"<p>Ushbu mobil operatorlarida USSD xizmati bo'lmagani sababli sizda xatolik yuz bermoqda. Siz bizning online interfeyslarimiz orqali foydalanishingiz mumkin</p>"}},{"id":"p1r613450u652450","title":{"ru":"Да Корейски","uz":"Xa koreya"},"reply":{"ru":"<p>Проблема в том что с корейских телефонов USSD выдаст ошибку поэтому попробуйте поставить сим карту на другое устройство и проверить</p>","uz":"<p>Muammo shundaki koreyada ishlab chiqarilgan qurilmalarda USSD orqali foydalanishda xatoliklar yuz beradi. Sim kartangizni boshqa qurilmaga o'rnatib qayta tekshirib ko'ring</p>"}},{"id":"p1r617884u652520","title":{"ru":"Если SMS инфо \"0\"","uz":"Agar SMS инфо \"0\""},"reply":{"ru":"<p>У вас не подключена услуга смс информирования. Смс информирование можно подключить через банк(Хумо) и банкоматы(Узкард).</p>","uz":"<p>Sizda sms xabarnoma yoqilmagan. Sms xabarnoma xizmatini bank(Humo) yoki bankomat (Uzcard) orqali yoqishingiz mumkin. </p>"}},{"id":"p1r616830u652465","title":{"ru":"Да","uz":"Xa"},"reply":{"ru":"<p>Вам необходимо отключить WiFi и попробовать через мобильный интернет а далее при использования приложения можете через WiFi тоже</p>","uz":"<p>WiFi ni o'chirib o'zingizning mobil internetingiz orqali ro'yxatdan o'ting xatoliklar bo'lmaydi</p>"}},{"id":"p1r613489u652452","title":{"ru":"Если не получиться","uz":"Agar bo'lmasachi ?"},"reply":{"ru":"<p>Если проделанные действия не дали положительного результата, пожалуйста снимите видео с другого устройства и отправьте его нам при помощи нашего телеграмм бота @clickuz. Наши специалисты проведут проверку.</p>","uz":"<p>Agarda sizda o'zgarish bo'lmasa xatolik boshqa bir qurilma orqali videoga oling va bizga @clickuz botimiz orqali yuboring. Mutaxassislarimiz tekshirib o'tishadi</p>"}},{"id":"p1r617882u652519","title":{"ru":"Ввел данные по Шорт запросу","uz":"Qisqa kod orqali"},"reply":{"ru":"<p>(Скопируем номер телефона клиента и проверяем в арм \"Мониторинг\" -- \"История регистрации карт\" </p>","uz":"<p><strong><span style=\"color: #ff0000;\">Telefon raqamini kopirovat qilib ARM anketada \"Monitoring\" bo'limiga kiramiz va \"История регистрации карт\" bo'limiga raqammi kiritamiz. </span></strong></p>"}},{"id":"p1r616826u652461","title":{"ru":"Да","uz":"Xa"},"reply":{"ru":"<p>Не подключен ли у вас VPN ?</p>","uz":"<p>Sizda Vpn yoqilmaganmi ? </p>"}},{"id":"p1r613451u652451","title":{"ru":"Нет","uz":"Yo'q"},"reply":{"ru":"<p>Ваша карта узкард или хумо ? </p>","uz":"<p>Sizning kartangiz Uzcardmi yoki HUMO ?</p>"}},{"id":"p1r617885u652521","title":{"ru":"Если SMS инфо не совпадает","uz":"Agar SMS инфо не совпадает"},"reply":{"ru":"<p>Услуга смс информирования подключена на другой номер. Номер <span>Смс информирование можно изменить через банк(Хумо) и банкоматы(Узкард)</span></p>","uz":"<p>Sms xabarnoma xizmati boshqa raqamga yoqilgan. Sms xabarnoma xizmatini bank (humo) yoki bankomat (Uzcard) orqali o'zgartirishingiz mumkin. </p>"}},{"id":"p1r890762u890763","title":{"ru":"обнаружен root-доступ","uz":"Qurilmaning zaiflik aniqlandi"},"reply":{"ru":"<p>[скриншот в оригинале скрипта]<br/><br/>На вашем устройстве обнаружен root-доступ (расширенные права к системе устройства).</p>\n<p>Такие права позволяют изменять системные настройки и влиять на работу устройства, что может снижать уровень безопасности. По этой причине приложение Click не поддерживает работу на устройствах с активным root-доступом.</p>\n<p>Для безопасного использования приложения необходимо отключить root-доступ или воспользоваться другим устройством без таких прав.</p>\n<p>Обратите внимание, что способ удаления root-доступа зависит от того, каким образом он был установлен. Неправильные действия могут привести к сбоям в работе устройства или потере данных.</p>\n<p>В связи с этим рекомендуется обратиться в сервисный центр или к квалифицированному специалисту, чтобы безопасно удалить root-доступ и восстановить корректную работу устройства.</p>\n<p>До устранения проблемы вы можете воспользоваться альтернативными способами взаимодействия с системой CLICK (телеграм бот @clickuz. USSD *880#) <br/><br/><span style=\"color: rgb(22, 145, 121);\">Оператору:</span> отрпавить ссылку на регистрацию в телеграм @clickuz или же интсрукцию выполнения неоюходимых действий в USSD </p>","uz":"<p data-end=\"79\" data-start=\"0\">[скриншот в оригинале скрипта]<br/>Qurilmangizda root-dostup (tizimga kengaytirilgan kirish huquqlari) aniqlangan.</p>\n<p data-end=\"329\" data-start=\"81\">Bunday huquqlar tizim sozlamalarini o‘zgartirish va qurilma ishlashiga ta’sir qilish imkonini beradi, bu esa xavfsizlik darajasini pasaytirishi mumkin. Shu sababli Click ilovasi root-dostup faol bo‘lgan qurilmalarda ishlashni qo‘llab-quvvatlamaydi.</p>\n<p data-end=\"457\" data-start=\"331\">Ilovadan xavfsiz foydalanish uchun root-dostupni o‘chirib qo‘yish yoki bunday huquqlarsiz boshqa qurilmadan foydalanish zarur.</p>\n<p data-end=\"650\" data-start=\"459\">E’tibor bering, root-dostupni olib tashlash usuli uning qanday o‘rnatilganiga bog‘liq. Noto‘g‘ri harakatlar qurilma ishlashida nosozliklarga yoki ma’lumotlar yo‘qolishiga olib kelishi mumkin.</p>\n<p data-end=\"839\" data-start=\"652\">Shu munosabat bilan root-dostupni xavfsiz tarzda olib tashlash va qurilmaning to‘g‘ri ishlashini tiklash uchun servis markaziga yoki malakali mutaxassisga murojaat qilish tavsiya etiladi.</p>\n<p data-end=\"975\" data-start=\"841\">Muammo bartaraf etilgunga qadar siz CLICK tizimi bilan muqobil usullar orqali ishlashingiz mumkin (Telegram bot @clickuz, USSD *880#).</p>\n<p data-end=\"1144\" data-is-last-node=\"\" data-is-only-node=\"\" data-start=\"977\"><span style=\"color: rgb(22, 145, 121);\">Operator uchun:</span> foydalanuvchiga Telegram’da @clickuz orqali ro‘yxatdan o‘tish havolasini yuborish yoki USSD orqali zarur amallarni bajarish bo‘yicha yo‘riqnoma berish.</p>"}},{"id":"p1r617238u652480","title":{"ru":"Telegram bot","uz":"Telegram bot"},"reply":{"ru":"<p>(Отправьте смс шаблон \"Регистрация в telegram bot\") <br/><br/>Уважаемый (Имя пользователя) перейдите по ссылке в SMS который мы вам отправили. <br/><br/>[скриншот в оригинале скрипта]</p>","uz":"<p>(Sms shablon yuboramiz\"Регистрация в telegram bot\") <br/><br/></p>\n<p class=\"leading-8 font-normal\" data-pm-slice=\"1 1 []\">Hurmatli (Foydalanuvchi ismi) biz sizga yuborgan SMSdagi havola orqalik o`ting.<br/><br/>[скриншот в оригинале скрипта]</p>"}},{"id":"p1r617888u652524","title":{"ru":"Если 1B процессе","uz":"Agar 1B процессе"},"reply":{"ru":"<div class=\"text-sm text-gray-700 bg-gray-50 p-4 rounded-lg text-center\">Реплика менеджера не указана!</div>","uz":"<p>Karta ma'lumotlarini olishda va ro'yxatdan o'tishda kichik uzilishlar mavjud. Keyinroq qaytadan urunib ko'ring</p>"}},{"id":"p1r615814u652460","title":{"ru":"Да","uz":"Xa"},"reply":{"ru":"<p>Попробуйте ввести код регистрации заново</p>","uz":"<p>registratsiya kodini qayta kiritib ko'ring</p>"}},{"id":"p1r616904u652470","title":{"ru":"У меня одинаковые номера","uz":"Menda bir xil raqam"},"reply":{"ru":"<p>Тогда ошибку можете по подробнее прочитать пожалуйста</p>","uz":"<p>Xatolikni batafsil ta'riflab bera olasizmi ? </p>"}},{"id":"p1r616831u652466","title":{"ru":"Как подключить роуминг ?","uz":"Rouming qanday yoqish mumkin"},"reply":{"ru":"<p>По этому вопросу вам надо обратиться в свою компанию мобильного оператора</p>","uz":"<p>Afsuski bu savol bilan siz mobil operatoringizga murojaat qilishingiz lozim. </p>"}},{"id":"p1r613638u652458","title":{"ru":"Пин не могу поставить","uz":"Pin ornatolmadim"},"reply":{" qamini kiritasiz, so`ngra kamera yongach, ekranda paydo bo`lgan xoshiyaga yuzingizni to`g`irlaysiz. (2) JShShIR ni kiritasiz, so`ngra <span>ekranda paydo bo`lgan xoshiyaga yuzingizni to`g`irlaysiz, kamerani yongach</span> <br/><br/>Ma`lumotlar tasdiqlanganidan so`ng Siz Identifikatsiyadan to`liq o`tgan hisoblanasiz.</p>"}},{"id":"p1u749998","title":{"uz":"Identifikatsiya o'chirish"},"reply":{"uz":"<p>identifikatsiya ma'lumotlarini o'chirish uchun bizning rasmiy pochta manzilimizga ariza bilan murojaat qilishingiz lozim. Arizani A4 formatdagi varoqqa yozib ushbu ariza pochta orqali yuborasiz</p>\n<p>«CLICK» AJ Bosh direktori<br/>Rustamov U.Sh.ga<br/>______________________ dan<br/>(to'liq F.I.Sh)</p>\n<p>Ariza<br/>Sizdan +998_______________ raqamli akkauntimdagi identifikatsiya ma'lumotlarini o'chirishingizni so'rayman.<br/>Pasport ma'lumotlarim:<br/>Seriya___________________<br/>Kim tomonidan berilgan</p>\n<p>Ilova:</p>\n<p>1) Pasport - skaner nusxasi<br/>2) Qayta aloqalar uchun raqam<br/>3) Mobil operator bilan shartnomaning nusxasi<br/>2024 y. _______«»</p>\n<p>Elektron pochtamiz manzili: <a href=\"mailto:info@click.uz\">info@click.uz</a></p>\n<p>Mobil operator bilan shartnoma firibgarlik harakatlaridan himoyalanish uchun zarur. Ushbu shartnomani siz mobil operatoringizning shaxsiy kabineti orqali ham olishingiz mumkin. </p>"}},{"id":"p1u652557","title":{"uz":"Ha"},"reply":{"uz":"<p>Sizning passport ma'lumotlaringiz MYID orqali tekshiriladi. Ma'lumotlar to'g'riligini tekshiring va qaytadan urunib ko'ring</p>"}},{"id":"p1u652559","title":{"uz":"Yuzni tanimayabdi"},"reply":{"uz":"<p>Identifikatsiyadan o`tayotganda xona yoruqligi hamda kamerani tiniqligiga ishoch xosil qilib oling, so`ngra belgilangan xoshiyaga yuzingizni aniq tuting</p>"}},{"id":"p1u655387","title":{"uz":"Yo`q, raxmat"},"reply":{"uz":"<p>Murojaatingiz uchun raxmat. Salomat bo'ling</p>"}},{"id":"p1root","title":{"ru":"Начало разговора","uz":"Suhbat boshlanishi"},"reply":{"ru":"<p>Здравствуйте. Оператор (Имя). Чем могу вам помочь ?</p>","uz":"<p>Assalomu alaykum. Operator (ism), sizga qanday yordam bera olaman ? </p>"}}],"edges":[{"parent":"p1r612881u652436","child":"p1r613635u652455"},{"parent":"p1r617882u652519","child":"p1r617885u652521"},{"parent":"p1r612880u652435","child":"p1r612885u652440"},{"parent":"p1r617884u652520","child":"p1r613489u652452"},{"parent":"p1r612851u652426","child":"p1r612883u652438"},{"parent":"p1u652812","child":"p1r612930u652444"},{"parent":"p1root","child":"p1r612852u652427"},{"parent":"p1r613489u652452","child":"p1r612930u652444"},{"parent":"p1r616826u652461","child":"p1r616829u652464"},{"parent":"p1r616903u652469","child":"p1r616911u652477"},{"parent":"p1r617885u652521","child":"p1r613489u652452"},{"parent":"p1r617239u652481","child":"p1r613489u652452"},{"parent":"p1r612852u652427","child":"p1r617237u652479"},{"parent":"p1r616905u652471","child":"p1r616907u652473"},{"parent":"p1r617882u652519","child":"p1r617888u652524"},{"parent":"p1r613450u652450","child":"p1r613489u652452"},{"parent":"p1root","child":"p1r612851u652426"},{"parent":"p1r616908u652474","child":"p1r612930u652444"},{"parent":"p1u652555","child":"p1u652560"},{"parent":"p1u652553","child":"p1r612930u652444"},{"parent":"p1r613451u652451","child":"p1r612888u652443"},{"parent":"p1r873540u873544","child":"p1r618091u652549"},{"parent":"p1r613443u652448","child":"p1r613451u652451"},{"parent":"p1r617880u652517","child":"p1r617881u652518"},{"parent":"p1r616901u652467","child":"p1r612930u652444"},{"parent":"p1r612880u652435","child":"p1r612886u652441"},{"parent":"p1r612881u652436","child":"p1r890762u890763"},{"parent":"p1u652555","child":"p1u652559"},{"parent":"p1r612883u652438","child":"p1r613636u652456"},{"parent":"p1r616827u652462","child":"p1r616831u652466"},{"parent":"p1r612883u652438","child":"p1r613635u652455"},{"parent":"p1u652557","child":"p1r612930u652444"},{"parent":"p1r618295u655097","child":"p1u749998"},{"parent":"p1u652560","child":"p1r612930u652444"},{"parent":"p1r 444"},{"parent":"p1u652557","child":"p1r613489u652452"},{"parent":"p1u652556","child":"p1u652558"},{"parent":"p1r848175u750042","child":"p1u652553"},{"parent":"p1r615814u652460","child":"p1r612930u652444"},{"parent":"p1r613448u652449","child":"p1r612930u652444"},{"parent":"p1u652559","child":"p1r613489u652452"},{"parent":"p1r612881u652436","child":"p1r613638u652458"},{"parent":"p1r616831u652466","child":"p1r612930u652444"},{"parent":"p1r616830u652465","child":"p1r612930u652444"},{"parent":"p1r873540u873544","child":"p1r873543u873547"},{"parent":"p1r617237u652479","child":"p1r612930u652444"},{"parent":"p1r617882u652519","child":"p1r617884u652520"},{"parent":"p1r617240u652482","child":"p1r612930u652444"},{"parent":"p1r873540u873544","child":"p1r873541u873545"},{"parent":"p1r616909u652475","child":"p1r612930u652444"},{"parent":"p1r617882u652519","child":"p1r617886u652522"},{"parent":"p1r613437u652446","child":"p1r612930u652444"},{"parent":"p1r612880u652435","child":"p1r612884u652439"},{"parent":"p1r617884u652520","child":"p1r613437u652446"},{"parent":"p1r616907u652473","child":"p1r616908u652474"},{"parent":"p1r612852u652427","child":"p1r617238u652480"},{"parent":"p1r612882u652437","child":"p1r616903u652469"},{"parent":"p1r618295u655097","child":"p1r612930u652444"},{"parent":"p1r612882u652437","child":"p1r613636u652456"},{"parent":"p1u655386","child":"p1u655387"},{"parent":"p1r612851u652426","child":"p1r897370u897371"},{"parent":"p1r612881u652436","child":"p1r897370u897371"},{"parent":"p1r617881u652518","child":"p1r613489u652452"},{"parent":"p1r612930u652444","child":"p1r612974u652445"},{"parent":"p1r617885u652521","child":"p1r613437u652446"},{"parent":"p1r616908u652474","child":"p1r613489u652452"},{"parent":"p1r612886u652441","child":"p1r612930u652444"},{"parent":"p1r613635u652455","child":"p1r612930u652444"},{"parent":"p1r616911u652477","child":"p1r612930u652444"},{"parent":"p1r612883u652438","child":"p1r613638u652458"},{"parent":"p1r612885u652440","child":"p1r612930u652444"},{"parent":"p1r617887u652523","child":"p1r613489u652452"},{"parent":"p1r617882u652519","child":"p1r617887u652523"},{"parent":"p1r612884u652439","child":"p1r612888u652443"},{"parent":"p1u652556","child":"p1u652557"},{"parent":"p1r616828u652463","child":"p1r616830u652465"},{"parent":"p1r612880u652435","child":"p1r617880u652517"},{"parent":"p1r616826u652461","child":"p1r616828u652463"},{"parent":"p1r612881u652436","child":"p1r613636u652456"},{"parent":"p1r612887u652442","child":"p1r613437u652446"},{"parent":"p1r616829u652464","child":"p1r613489u652452"},{"parent":"p1u652560","child":"p1r613489u652452"}]},{"name":{"ru":"CLICK — Кошелёк","uz":"CLICK — Hamyon"},"rootId":"p2r612853u652428","nodes":[{"id":"p2r617250u652483","title":{"ru":"Как открыть кошелёк ?","uz":"Hamyon qanday yaratish mumkin ?"},"reply":{"ru":"<p><span>В приложении CLICK  Up пролистайте свои карты, если таковые есть, до конца и нажмите на «Добавить карту». Также можно перейти в раздел «Мои карты» и там выбрать опцию «Добавление карты». Из предложенных вариантов выберите CLICK-Кошелёк. После этого вам будет необходимо указать свой день рождения и, ознакомившись с условиями оферты, выразить согласие с ними. Просим иметь в виду, что необходимо указывать актуальную дату рождения, так как она будет необходима для восстановления кошелька при утере к нему доступа. По умолчанию, пользователям CLICK открывается кошелёк статуса Light.</span></p>","uz":"<p><span>Click up ilovasida kartalaringiz ro'yxatiga o'ting va \"karta qo'shish\" tugmasini bosing.Sizga chiqqan tanlovlar orasidan click hamyonni tanlang. So'ngra o'zingizning tug'ilgan sanangizni kiriting va ommaviy oferta shartlari bilan tanishib chiqib rozilik bildiring.Muhim! Click hamyon yaratish jarayonida o'zingizning tug'ilgan sanangizni kiriting, chunki ushbu sana hamyonni qayta tiklashda ishlatilinadi.</span></p>"}},{"id":"p2r898616u898627","title":{"ru":"Какой размер тарифа?","uz":"Tarif miqdori qancha?"},"reply":{"ru":"<p>Размер тарифа составляет 1% от БРВ плюс 12% НДС сверх суммы тарифа.</p>","uz":"<p>Tarif miqdori BHMning 1% va tarif summasidan tashqari qo‘shimcha 12% QQSni tashkil qiladi.</p>"}},{"id":"p2r617283u652499","title":{"ru":"Когда изменится","uz":"Qachon hal bo'ladi ?"},"reply":{"ru":"<p>К сожалению точно не могу сказать, но передали ваши данные техническому отделу скором времени ваш платеж отменится либо пройдет успешно</p>","uz":"<p>Afsuski aniq vaqti bizga noma'lum. Sizni to'lovingizni texnik hodimlarimizga tekshiruvga yuborib qo'ydik. Tez orada to'lov/o'tkazma bekor qilinadi yoki muvaffaqiyatli amalga oshadi. To'lov/o'tkazma holatini hisobotlar bo'limi orqali tekshirishingiz mumkin. </p>"}},{"id":"p2r617277u652494","title":{"ru":"Перевод с кошелька на карту, не подключенной к CLICK, невозможен","uz":"Ushbu turdagi kartalar orasida mumkin emas"},"reply":{"ru":"<p>С CLICK кошелька можно вывести средства только на карты привязанные к системе CLICK.</p>","uz":"<p>CLICK hamyondan faqatgina CLICK tizimiga ulangan kartalarga o'tkazish mumkin</p>"}},{"id":"p2r617276u652493","title":{"ru":"Я уже попробовал не получился","uz":"Qilib ko'rdim bo'lmadi"},"reply":{"ru":"<p>Какую ошибку выдает вам ?</p>","uz":"<p>Aynan qanday xatolik yuz bermoqda ?</p>"}},{"id":"p2r617253u652486","title":{"ru":"Куда можно тратить деньги в кошельке","uz":"Hamyondagi pulni ishlatish"},"reply":{"ru":"<p>С Click кошелька вы можете оплатить за мобильные операторы, интернет провайдеры, коммунальные услуги ( газ, электроэнергия) так же сможете переводить средства на другой click кошелек ( комиссия не имеется) и даже можете перевести средства на карты подключенные к системе Click (комиссия- 1.5%). Можете так же совершать оплаты на местах.</p>","uz":"<p>Click hamyon orqali Siz uyali aloqa, internet provaydor, taxi.uz, Click hamyondan Click hamyonga(% olmaydi) va plastik kartalarga ham o'tkazma qilishingiz mumkin (o'tkazma uchun 1,5% ni tashkil etadi) va Joylarda to'lov xizmatidan ham to'lov amalga oshirishingiz mumkin bo'ladi va Komunal to'lovlarga ham to'lov qilishingiz mumkin.</p>"}},{"id":"p2r898617u898628","title":{"ru":"Когда производится списание?","uz":"Mablag‘ qachon yechiladi?"},"reply":{"ru":"<p>Списание производится ежемесячно и только при наличии положительного остатка на кошельке.</p>","uz":"<p>Mablag‘ har oy va faqat hamyonda ijobiy qoldiq mavjud bo‘lsa yechiladi.</p>"}},{"id":"p2r617275u652492","title":{"ru":"Как перевести на карту","uz":"Qanday kartaga o'tkazish mumkin"},"reply":{"ru":"<p>С CLICK кошелька можете перевести на карты Uzcard и Humo. Если вы пользуетесь USSD то сначала вам необходимо поставить кошелёк на основной счет и перевести вводя <i>*880*Номер карты*сумма# </i>а если через приложение то заходите на раздел переводы и введите туда номер карты или же если вы хотите перевести на свою карту то заходите в раздел между моими картами</p>","uz":"<p>CLICK hamyondan Uzcard va Humo kartalariga o'tkazma amalga oshirish mumkin. Agarda siz USSD orqali foydalansangiz avvalo hamyonni asosiy kartaga o'zgartirish lozim, so'ngra quyidagicha terib o'tkazma amalga oshirish mumkin <i>*880*karta raqami*summa# </i> Agarda ilova orqali foydalansangiz o'tkazmalar bo'limiga kiring va karta raqamlarini kiriting yoki o'zingizni kartangizga o'tkazmoqchi bo'lsangiz \"Kartalarim orasida\" tugmasini bosing va o'tkazmani amalga oshiring.</p>"}},{"id":"p2r617279u652496","title":{"ru":"Скоро будет доступно","uz":"Tez orada"},"reply":{"ru":"<p>Данному поставщику с кошелька оплаты не проходят поэтому у вас выдает ошибку.</p>","uz":"<p>Ushbu hamkorimizga click hamyonda to'lovlar amalga oshirish imkoni yo'q. </p>"}},{"id":"p2r898618u898629","title":{"ru":"Что будет если денег недостаточно?","uz":"Mablag‘ yetarli bo‘lmasa nima bo‘ladi?"},"reply":{"ru":"<p>Если остаток меньше суммы тарифа, будет списан только доступный остаток без ухода в минус.</p>","uz":"<p>Agar mablag‘ tarifdan kam bo‘lsa, faqat mavjud qoldiq yechiladi va balans minusga tushmaydi.</p>"}},{"id":"p2r617267u652488","title":{"ru":"Нет","uz":"Yo'q"},"reply":{"ru":"<p>Нажмите на кошелёк и выберите кнопку активировать кошёлек. Затем введите свою дату рождения и если вы при создании кошелька ввели свою дату рождения то у вас получиться. Если выдаст ошибку что дата не совпадает то позвоните нам мы вам поможем вам активировать</p>","uz":"<p>Click hamyon ustiga bosing va faollashtirish tugmasini bosing. So'ngra tug'ilgan sanangizni kiriting. Agarda siz hamyon yaratgan vaqtingizda tug'ilgan sanangizni to'g'ri kiritgan bo'lsangiz bu holatda sizda hamyon faollashadi. Agarda sana to'g'ri kelmadi deb xatolik bersa biz bilan bog'laning sizga yordam beramiz.</p>"}},{"id":"p2r898620u898631","title":{"ru":"На кого распространяется тариф?","uz":"Tarif kimlarga qo‘llaniladi?"},"reply":{"ru":"<p>Тариф применяется только к кошелькам физических лиц и не распространяется на самозанятых и юридических лиц.</p>","uz":"<p>Tarif faqat jismoniy shaxslarning hamyonlariga qo‘llaniladi va o‘zini o‘zi band qilganlar hamda yuridik shaxslarga tatbiq etilmaydi.</p>"}},{"id":"p2r612930u652444","title":{"ru":"Понял","uz":"Tushunarli"},"reply":{"ru":"<p>Есть ли у вас еще вопросы ?</p>","uz":"<p>Yana savollaringiz bormi ? </p>"}},{"id":"p2r612853u652428","title":{"ru":"CLICK Кошелек","uz":"CLICK Hamyon"},"reply":{"ru":"<p><span>CLICK-кошелёк — это </span><strong>виртуальный счёт, который можно пополнять, оплачивать с него различные товары и услуги и переводить с него средства на другие кошельки и карты. <br/><br/><span>CLICK-кошельки бывают 2 видов:</span><br/></strong></p>\n<ul>\n<li>Light – имеет некоторые ограничения - например, баланс данного кошелька не может превышать 5 БРВ в любое время (1 700 000 сумов, 1 БРВ = 340 000 сумов).</li>\n<li>Unlim – дает возможность хранить в CLICK-Кошельке – до 500 млн сумов. Кроме того, можно будет совершать переводы и производить оплаты суммой до 30 000 000 сум.</li>\n</ul>\n<p>Для получения статуса Unlim пользователю CLICK-кошелька необходимо пройти идентификацию. </p>","uz":"<p><strong>Click-Hamyon — bu virtual hisob bo'lib, uni to'ldirish mumkin, undan turli xizmatlarga va xaridlarga to'lasa va pul o'tkazmalarini amalga oshirsa bo'ladi.<br/><br/>CLICK Hamyon 2 turi mavjud:<br/></strong></p>\n<ul>\n<li>Light – Ba'zi cheklovlar mavjud - masalan, bunday hamyonning balansi 5 BHMdan oshmasligi kerak (1 700 000 so'm, 1 BHM = 340 000 so'm).</li>\n<li>Unlim – Unlim Click-Hamyonda 500 mln so'mgacha mablag' saqlash mumkin. Bundan tashqari, Premium yordamida 30 mln so'mgacha to'lovlar amalga oshirish va mablag' o'tkazish mumkin.</li>\n</ul>\n<p>Unlim hamyon olish uchun Click Up ilovasi orqali identifikatsiyadan o'tishingiz lozim </p>"}},{"id":"p2r617268u652489","title":{"ru":"Да, но не получилось","uz":"Xa, lekin bo'lmadi"},"reply":{"ru":"<p><span style=\"color: #ff0000; font-family: 'arial black', 'avant garde';\"><span style=\"color: #000000;\">При создании кошелька вы ввели рандомную дату по этому у вас данный момент не получается активировать. я принял(а) заявку и в течении 5 минут с вами свяжемся</span><br/><br/></span></p>\n<p><span style=\"color: #000000; font-family: 'arial black', 'avant garde';\"></span></p>","uz":"<p><span style=\"color: #ff0000; font-family: 'arial black', 'avant garde';\"><span style=\"color: #000000;\">Click hamyon yaratilgan vaqtda siz noto'g'ri sanani kiritgansiz shu sababli sizda xatolik yuz bermoqda. Siz bilan 5 daqiqa ichida qayta bog'lanamiz. Passport ma'lumotlaringizni tasdiqlasangiz sizga yordam beramiz. </span><br/><br/></span></p>\n<p><span style=\"color: #000000; font-family: 'arial black', 'avant garde';\"></span></p>"}},{"id":"p2r612974u652445","title":{"ru":"Нет спасибо","uz":"Yo"},"reply":{"ru":"<p>благодарим за обращение, ответьте на вопрос после звонка До свидание</p>","uz":"<p>Murojaatingiz uchun raxmat. Suhbatdan keyingi savolga javob qoldirishingizni so'raymiz. Salomat bo'ling</p>"}},{"id":"p2r617252u652485","title":{"ru":"удалить кошелёк","uz":"Hamyon o'chirish"},"reply":{"ru":"<p><span>Необходимо нажать на кнопку «Закрыть кошелёк». Система предложит потратить остаток кошелька, при наличии такового, на оплату, пожертвование или забрать остаток переводя их на карты</span></p>","uz":"<p>Hamyonning ustiga bosing va «Hamyon o'chirish» tugmasini tanlang. Tizim sizga ichidagi mablag'ni ishlatishni yoki to'lovlar amalga oshirishni taklif qiladi. </p>"}},{"id":"p2r617251u652484","title":{"ru":"Не активен","uz":"Faol emas."},"reply":{"ru":"<p>Попробовали вы ввести свою дату рождения для активации</p>","uz":"<p>Tug'ilgan sanangizni kiritib faollashtirishga urunib ko'rdingizmi ? </p>"}},{"id":"p2r898615u898626","title":{"ru":"Какие операции считаются активностью кошелька?","uz":"Qaysi operatsiyalar hamyon faolligi hisoblanadi?"},"reply":{"ru":"<p>К операциям относятся: платежи и переводы, пополнение, начисление кешбэка, акционные зачисления и другие движения средств.</p>","uz":"<p>Operatsiyalarga to‘lov va o‘tkazmalar, hisobni to‘ldirish, cashback tushumi, aksiya bonuslari va boshqa mablag‘ harakatlari kiradi.</p>"}},{"id":"p2r617282u652498","title":{"ru":"Номер клиента","uz":"Telefon raqam"},"reply":{"ru":"<p><span style=\"color: #ff0000;\">Проверяем действительно ли подлючена карта на этот номер если да то просим еще раз попробовать. Если не подключена: </span><span style=\"color: #ff0000;\">На этом номере нет такой карты. Подключите карту и попробуйте перевести заново</span></p>","uz":"<p><span style=\"color: #ff0000;\">Karta rostdan ham ulanganmi yo'qmi tekshiramiz va agarda ulangan bo'lsa qaytadan urunib ko'rishni tavfsiya qilamiz.  Agar yoqilmagan bo'lsa: <span style=\"color: #000000;\">Ushbu raqamda karta ulanmagan, kartani click tizimiga ulab so'ngra qayta o'tkazing </span></span></p>"}},{"id":"p2r613489u652452","title":{"ru":"Если не получиться","uz":"Agar bo'lmasachi ?"},"reply":{"ru":"<p>Если проделанные действия не дали положительного результата, пожалуйста снимите видео с другого устройства и отправьте его нам при помощи нашего телеграмм бота @clickuz. Наши специалисты проведут проверку.</p>","uz":"<p>Agarda sizda o'zgarish bo'lmasa xatolik boshqa bir qurilma orqali videoga oling va bizga @clickuz botimiz orqali yuboring. Mutaxassislarimiz tekshirib o'tishadi</p>"}},{"id":"p2r898621u898632","title":{"ru":"В каких ещё случаях применяется тариф?","uz":"Tarif yana qaysi holatlarda qo‘llaniladi?"},"reply":{"ru":"<p>Тариф может применяться к кошелькам с остатком после удаления аккаунта и кошелькам в статусе досписания.</p>","uz":"<p>Tarif akkaunt o‘chirilgandan keyin qoldiq qolgan hamyonlarga va “dospisaniya” statusidagi hamyonlarga ham qo‘llanishi mumkin.</p>"}},{"id":"p2r617254u652487","title":{"ru":"Как можно пополнить","uz":"Qanday to'ldirish mumkin"},"reply":{"ru":"<p>Пополнять кошелек вы можете с других карт через систему CLICK и Paynet, также пополнять кошелек можно наличными через инфокиоски Paynet. </p>","uz":"<p>CLICK tizimi orqali o'tkazmalarni amalga oshirib to'ldirishingiz mumkin yoki  Paynet bankomatlari orqali naqd pulda to'ldirish mumkin</p>"}},{"id":"p2r898613u898624","title":{"ru":"Обслуживание кошелька","uz":"CLICK hamyoning xizmat haqqi"},"reply":{"ru":"<p>Изменения связаны с необходимостью поддержания стабильной и безопасной работы инфраструктуры, обслуживания неактивных кошельков и защиты данных пользователей.</p>","uz":"<p>Mazkur o‘zgarishlar infratuzilmaning barqaror va xavfsiz ishlashi, nofaol hamyonlarga xizmat ko‘rsatish va foydalanuvchi ma’lumotlarini himoya qilish zarurati bilan bog‘liq.</p>"}},{"id":"p2r898619u898630","title":{"ru":"Будут ли дальнейшие списания после обнуления?","uz":"Balans nol bo‘lsa yana yechim bo‘ladimi?"},"reply":{"ru":"<p>Нет. После полного списания остатка дальнейшие списания не производятся, пока баланс снова не станет положительным.</p>","uz":"<p>Yo‘q. Balans yana ijobiy bo‘lmaguncha keyingi yechimlar amalga oshirilmaydi.</p>"}},{"id":"p2r617783u652512","title":{"ru":"как получить кошелек премиум","uz":"Qanday premium olish mumkin"},"reply":{"ru":"<p>Для этого вам необходимо пер adi.</p>"}},{"id":"p2r617271u652490","title":{"ru":"Light кошелёк","uz":"Light hamyon"},"reply":{"ru":"<p>Делаем исход и спрашиваем дату рождения клиента и серию паспорта. После отправим все эти данные в группу \"СТП Рабочая группа\" и продиктуем клиенту ту дату которые отправили в группе</p>","uz":"<p>Qayta qo'ng'iroq qilamiz va mijoz passport seriya raqamlarini, tug'ilgan sanasini aniqlashtiramiz. So'ngra barcha ma'lumotlarni  \"СТП Рабочая группа\"ga yuboramiz  va javob berilgan sanani mijozga taqdim etamiz.</p>"}},{"id":"p2r617278u652495","title":{"ru":"Недостаточно средств","uz":"Mablag' yetarli emas"},"reply":{"ru":"<p><span style=\"color: #ff0000;\">Проверяем баланс кошелька если там есть средства но выдает ошибку открываем в анкете раздел \" В Процессе\" если там есть повисший платеж то говорим: <span style=\"color: #000000;\">У вас есть платеж в обработке и поэтому сейчас у вас не получается оплатить/перевести. Ждите изменение статуса вашего раннего платежа и попробуйте заново. </span></span></p>","uz":"<p><span style=\"color: #ff0000;\">Hamyon balansini tekshiramiz va agarda hamyon balansida yetarlicha mablag' bo'lsa ARM anketadan \"В процессе\" bo'limini tekshiramiz. Shu yerda to'lov bo'lsa: <span style=\"color: #000000;\">Sizda ishlov holatida to'lov/o'tkazma mavjud.</span><span style=\"color: #000000;\"> Iltimos sizdagi to'lov holati o'zgarishini kuting va keyinroq qaytadan urunib ko'ring. To'lov holatini hisobotlar bo'limi orqali tekshirishingiz mumkin. </span></span></p>"}}],"edges":[{"parent":"p2r617271u652490","child":"p2r612930u652444"},{"parent":"p2r617275u652492","child":"p2r612930u652444"},{"parent":"p2r617251u652484","child":"p2r617268u652489"},{"parent":"p2r617282u652498","child":"p2r612930u652444"},{"parent":"p2r617279u652496","child":"p2r612930u652444"},{"parent":"p2r617783u652512","child":"p2r612930u652444"},{"parent":"p2r612853u652428","child":"p2r617253u652486"},{"parent":"p2r617252u652485","child":"p2r612930u652444"},{"parent":"p2r617251 function loadData() {
  try {
    var raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) { var seeded = seedData(); saveData(seeded); return seeded; }
    return JSON.parse(raw);
  } catch (e) {
    var seeded2 = seedData(); saveData(seeded2); return seeded2;
  }
}
function saveData(data) { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }

/* ---- session ---- */
var SESSION_KEY = 'ssb_session_v1';
function saveSession(userId) { try { localStorage.setItem(SESSION_KEY, userId); } catch (e) {} }
function clearSession() { try { localStorage.removeItem(SESSION_KEY); } catch (e) {} }
function restoreSession(data) {
  try {
    var userId = localStorage.getItem(SESSION_KEY);
    return userId && data.users.some(function (u) { return u.id === userId; }) ? userId : null;
  } catch (e) { return null; }
}

function createUserAccount(data, name, email, password, role) {
  var id = uid('u');
  data.users.push({ id: id, name: name, email: email, password: password, role: role });
  saveData(data);
  return id;
}
function deleteUserAccount(data, userId) {
  data.users = data.users.filter(function (u) { return u.id !== userId; });
  data.access = data.access.filter(function (a) { return a.userId !== userId; });
  saveData(data);
}

/* ---- projects ---- */
function visibleProjects(data, user) {
  if (!user) return [];
  if (user.role === 'admin') {
    var accessIds = data.access.filter(function (a) { return a.userId === user.id; }).map(function (a) { return a.projectId; });
    return data.projects.filter(function (p) { return !p.deletedAt && (p.ownerId === user.id || accessIds.indexOf(p.id) !== -1); });

}
function trashedProjects(data, user) {

/* ---- nodes & edges ---- */
function projectNodes(data, projectId) { return data.nodes.filter(function (n) { return n.projectId === projectId; }); }
function childEdges(data, parentNodeId) { return data.edges.filter(function (e) { return e.parentNodeId === parentNodeId; }).sort(function (a, b) { return a.sortOrder - b.sortOrder; }); }
function parentEdgesOf(data, nodeId) { return data.edges.filter(function (e) { return e.childNodeId === nodeId; }); }
function createNode(data, projectId, title, managerReply, lang) {
  lang = lang || 'ru';
  var id = uid('n');
  var titleObj = {}; titleObj[lang] = title;
  var replyObj = {}; if (managerReply) replyObj[lang] = managerReply;
  data.nodes.push({ id: id, projectId: projectId, title: titleObj, managerReply: replyObj });
  return id;
}
function attachNode(data, parentNodeId, childNodeId) {
  var siblings = childEdges(data, parentNodeId);
  var order = siblings.length ? siblings[siblings.length - 1].sortOrder + 1 : 0;
  data.edges.push({ id: uid('e'), parentNodeId: parentNodeId, childNodeId: childNodeId, sortOrder: order });
}
function detachEdge(data, edgeId) {
  data.edges = data.edges.filter(function (e) { return e.id !== edgeId; });
  saveData(data);
}
function collectSubtree(data, nodeId) {
  var visited = new Set(); var stack = [nodeId];
  while (stack.length) {
    var id = stack.pop();
    if (visited.has(id)) continue;
    visited.add(id);
    data.edges.filter(function (e) { return e.parentNodeId === id; }).forEach(function (e) { stack.push(e.childNodeId); });
  }
  return visited;
}

  var warned = [];
  subtree.forEach(function (id) {
    if (id === nodeId) return;
    var parents = parentEdgesOf(data, id).filter(function (e) { return !subtree.has(e.parentNodeId); });
    if (parents.length) {
      var n = data.nodes.find(function (x) { return x.id === id; });
      if (n) warned.push(nodeTitle(n, state.activeLang));
    }
  });
  return warned;
}
function cascadeDeleteNode(data, nodeId) {
  var subtree = collectSubtree(data, nodeId);
  data.nodes = data.nodes.filter(function (n) { return !subtree.has(n.id); });
  data.edges = data.edges.filter(function (e) { return !subtree.has(e.parentNodeId) && !subtree.has(e.childNodeId); });
  saveData(data);
}
function isNodeReused(data, nodeId) { return parentEdgesOf(data, nodeId).length > 1; }

}

    if (!node) return false;
    var selfMatch = nodeTitle(node, state.activeLang).toLowerCase().indexOf(q) !== -1;
    var childMatch = false;
    childEdges(data, nodeId).forEach(function (e) { if (walk(e.childNodeId, path.concat(nodeId))) childMatch = true; });
    if (selfMatch || childMatch) { visible.add(nodeId); if (childMatch) autoExpand.add(nodeId); return true; }
    return false;

/* Shared interaction wiring for any rendered node-row tree (main editor pane,
   or the "Управление ветками" modal) — onChange is called after any mutation
   so the caller can decide what to re-render. */
function wireTreeInteractions(scopeEl, onChange) {
  scopeEl.querySelectorAll('[data-toggle]').forEach(function (el) {
    el.addEventListener('click', function (e) {
      e.stopPropagation();
      var id = el.getAttribute('data-toggle');
      state.expanded[id] = !state.expanded[id];
      onChange();
    });
  });
  scopeEl.querySelectorAll('[data-add]').forEach(function (el) {
    el.addEventListener('click', function (e) { e.stopPropagation(); openAddAnswersModal(el.getAttribute('data-add'), onChange); });
  });
  scopeEl.querySelectorAll('.edit-reply-btn').forEach(function (el) {
    el.addEventListener('click', function (e) { e.stopPropagation(); openReplyEditorModal(el.getAttribute('data-edit-reply'), onChange); });
  });
  scopeEl.querySelectorAll('[data-node-act]').forEach(function (el) {
    el.addEventListener('click', function (e) {
      e.stopPropagation();
      var id = el.getAttribute('data-id');
      var act = el.getAttribute('data-node-act');
      var node = data.nodes.find(function (n) { return n.id === id; });
      if (!node) return;
      if (act === 'rename') {
        var name = prompt('Текст варианта ответа (' + state.activeLang.toUpperCase() + '):', nodeTitle(node, state.activeLang));
        if (name && name.trim()) { node.title[state.activeLang] = name.trim(); saveData(data); onChange(); }
      } else if (act === 'branch') {
        openBranchViewModal(id, el.getAttribute('data-parent'));
      } else if (act === 'detach') {
        var parentId = el.getAttribute('data-parent');
        var isOnlyParent = parentEdgesOf(data, id).length <= 1;
        var titleTxt = nodeTitle(node, state.activeLang);
        var msg = isOnlyParent
          ? 'Открепить «' + titleTxt + '»? Это единственное место, где используется узел — он останется в системе, но станет недоступен в дереве.'
          : 'Открепить «' + titleTxt + '» от этой ветки? Узел останется доступен в других местах, где он используется.';
        if (confirm(msg)) {
          var edge = data.edges.find(function (e) { return e.parentNodeId === parentId && e.childNodeId === id; });
          if (edge) detachEdge(data, edge.id);
          showToast('Откреплено'); onChange();
        }
      } else if (act === 'delete') {
        var warnings = findReuseWarnings(data, id);
        var msg2 = 'Удалить «' + nodeTitle(node, state.activeLang) + '» и все дочерние узлы без возможности восстановления?';
        if (warnings.length) msg2 += '\n\nВнимание: эти узлы также используются в других ветках и тоже будут удалены целиком:\n— ' + warnings.join('\n— ');
        if (confirm(msg2)) { cascadeDeleteNode(data, id); showToast('Удалено'); onChange(); }
      }
    });
  });
}

var branchModalCounter = 0;
function openBranchViewModal(nodeId, parentId) {
  var node = data.nodes.find(function (n) { return n.id === nodeId; });
  if (!node) return;
  if (state.expanded[nodeId] === undefined) state.expanded[nodeId] = true;
  var mid = 'bv' + (++branchModalCounter);
  var html = ''
    + '<div class="overlay" id="' + mid + 'Overlay"><div class="modal" style="width:480px;">'
    + '  <div class="modal-header"><h3 id="' + mid + 'Title">Управление ветками: ' + esc(nodeTitle(node, state.activeLang)) + '</h3><button class="icon-btn" id="' + mid + 'Close">✕</button></div>'
    + '  <div class="modal-body" id="' + mid + 'Body">' + renderNodeRow(node, 0, false, new Set(), false, parentId, null) + '</div>'
    + '  <div class="modal-footer"><button class="btn" id="' + mid + 'Close2">Закрыть</button></div>'
    + '</div></div>';
  document.body.insertAdjacentHTML('beforeend', html);

  function wireBody() {
    var body = document.getElementById(mid + 'Body');
    if (body) wireTreeInteractions(body, refresh);
  }
  function refresh() {
    var still = data.nodes.find(function (n) { return n.id === nodeId; });
    var body = document.getElementById(mid + 'Body');
    if (!still) { close(); render(); showToast('Узел удалён'); return; }
    if (body) {
      body.innerHTML = renderNodeRow(still, 0, false, new Set(), false, parentId, null);
      wireBody();
    }
    var titleEl = document.getElementById(mid + 'Title');
    if (titleEl) titleEl.textContent = 'Управление ветками: ' + nodeTitle(still, state.activeLang);
    render();
  }
  wireBody();

  function close() { var ov = document.getElementById(mid + 'Overlay'); if (ov) ov.remove(); }
  document.getElementById(mid + 'Close').addEventListener('click', close);
  document.getElementById(mid + 'Close2').addEventListener('click', close);
}

function openAddAnswersModal(parentNodeId, onDone) {
  onDone = onDone || render;
  var project = data.projects.find(function (p) { return p.id === state.currentProjectId; });
  var allNodes = projectNodes(data, project.id);
  var excludeIds = collectAncestors(data, parentNodeId);
  excludeIds.add(parentNodeId);
  var directChildIds = new Set(childEdges(data, parentNodeId).map(function (e) { return e.childNodeId; }));
  var candidates = allNodes.filter(function (n) { return !excludeIds.has(n.id) && !directChildIds.has(n.id); });

  var html = ''
    + '<div class="overlay" id="addAnswersOverlay"><div class="modal" style="width:520px;">'
    + '  <div class="modal-header"><h3>Добавить ответы (' + state.activeLang.toUpperCase() + ')</h3><button class="icon-btn" id="closeAddAnswers">✕</button></div>'
    + '  <div class="modal-body">'
    + '    <div class="field-label">Новые варианты ответа</div>'
    + '    <div class="new-answers-input" id="newAnswersChips"><input type="text" id="newAnswerInput" placeholder="Введите текст и нажмите Enter…"><span class="enter-hint">Enter</span></div>'
    + (candidates.length
        ? '    <div class="field-label" style="margin-top:16px;">Или выберите существующий узел для переиспользования</div>'
          + '    <div class="existing-answers-grid" id="existingAnswersGrid">' + candidates.map(function (n) {
              return '<button type="button" class="pill-btn" data-existing="' + n.id + '">' + esc(nodeTitle(n, state.activeLang)) + '</button>';
            }).join('') + '</div>'
        : '')
    + '  </div>'
    + '  <div class="modal-footer"><button class="btn" id="cancelAddAnswers">Отмена</button><button class="btn primary" id="saveAddAnswers">Добавить</button></div>'
    + '</div></div>';
  document.body.insertAdjacentHTML('beforeend', html);

  var chips = [];
  function attachInputHandler() {
    var input = document.getElementById('newAnswerInput');
    if (!input) return;
    input.addEventListener('keydown', function (e) {
      if (e.key === 'Enter') {
        e.preventDefault();
        var val = e.target.value.trim();
        if (val) { chips.push(val); renderChips(); }
      }
    });
  }
  function renderChips() {
    var container = document.getElementById('newAnswersChips');
    var chipsHtml = chips.map(function (title, i) {
      return '<span class="chip">' + esc(title) + '<button type="button" data-remove-chip="' + i + '">✕</button></span>';
    }).join('');
    container.innerHTML = chipsHtml + '<input type="text" id="newAnswerInput" placeholder="Введите текст и нажмите Enter…"><span class="enter-hint">Enter</span>';
    container.querySelectorAll('[data-remove-chip]').forEach(function (b) {
      b.addEventListener('click', function () { chips.splice(+b.getAttribute('data-remove-chip'), 1); renderChips(); });
    });
    attachInputHandler();
    document.getElementById('newAnswerInput').focus();
  }
  attachInputHandler();

  var selectedExisting = new Set();
  document.querySelectorAll('#addAnswersOverlay [data-existing]').forEach(function (b) {
    b.addEventListener('click', function () {
      var id = b.getAttribute('data-existing');
      if (selectedExisting.has(id)) { selectedExisting.delete(id); b.classList.remove('selected'); }
      else { selectedExisting.add(id); b.classList.add('selected'); }
    });
  });

  function close() { var ov = document.getElementById('addAnswersOverlay'); if (ov) ov.remove(); }
  document.getElementById('closeAddAnswers').addEventListener('click', close);
  document.getElementById('cancelAddAnswers').addEventListener('click', close);
  document.getElementById('saveAddAnswers').addEventListener('click', function () {
    var leftover = document.getElementById('newAnswerInput').value.trim();
    if (leftover) chips.push(leftover);

    var existingTitles = childEdges(data, parentNodeId).map(function (e) {
      var n = data.nodes.find(function (x) { return x.id === e.childNodeId; });
      return n ? nodeTitle(n, state.activeLang).trim().toLowerCase() : '';
    });
    var addedCount = 0;
    var skipped = [];
    var seenInBatch = {};
    chips.forEach(function (title) {
      var key = title.trim().toLowerCase();
      if (existingTitles.indexOf(key) !== -1 || seenInBatch[key]) { skipped.push(title); return; }
      seenInBatch[key] = true;
      var id = createNode(data, project.id, title, null, state.activeLang);
      attachNode(data, parentNodeId, id);
      addedCount++;
    });
    selectedExisting.forEach(function (id) { attachNode(data, parentNodeId, id); addedCount++; });

    if (!addedCount && !skipped.length) { showToast('Введите хотя бы один вариант ответа'); return; }

    saveData(data);
    state.expanded[parentNodeId] = true;
    close();
    var msg = addedCount ? 'Добавлено: ' + addedCount : 'Ничего не добавлено';
    if (skipped.length) msg += ' · уже есть: ' + skipped.join(', ');
    showToast(msg);
    onDone();
  });
}
